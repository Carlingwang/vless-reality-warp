{% extends "base.html" %}
{% block title %}系统设置 - 代理管理面板{% endblock %}
{% block content %}
<h1>系统设置</h1>

<div class="card" style="max-width:500px">
    <h3>修改密码</h3>
    <form method="POST" action="{{ url_for('change_password') }}">
        <div class="form-group">
            <label>当前密码</label>
            <input type="password" name="current_password" required>
        </div>
        <div class="form-group">
            <label>新密码</label>
            <input type="password" name="new_password" required minlength="8" placeholder="至少 8 个字符">
        </div>
        <div class="form-group">
            <label>确认新密码</label>
            <input type="password" name="confirm_password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary">确认修改</button>
    </form>
</div>

<div class="card" style="max-width:500px">
    <h3>面板信息</h3>
    <div class="info-row"><span>当前用户名</span><span class="mono">{{ username }}</span></div>
    <div class="info-row"><span>面板端口</span><span class="mono">{{ port }}</span></div>
</div>
{% endblock %}
